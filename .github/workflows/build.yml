name: Dev Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: set up java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: cache gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      - name: build
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: copy jar to releases folder
        run: |
          mkdir -p releases
          cp build/libs/SpectralBlocks-*.jar releases/SpectralBlocksDev${{ github.run_number }}.jar

      - name: commit dev build
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add releases/SpectralBlocksDev${{ github.run_number }}.jar
          git commit -m "build: SpectralBlocksDev${{ github.run_number }}"
          git push
